<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contactez-moi</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Roboto, Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    .card-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .card-header .icon {
      font-size: 48px;
      display: block;
      margin-bottom: 12px;
    }

    .card-header h1 {
      font-size: 28px;
      color: #2d3748;
      font-weight: 700;
    }

    .card-header p {
      color: #718096;
      margin-top: 6px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, textarea {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
      color: #2d3748;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
      font-family: inherit;
    }

    input:focus, textarea:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
    }

    .form-row {
      display: flex;
      gap: 16px;
    }

    .form-row .form-group {
      flex: 1;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 0.3px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.45);
    }

    .btn:active {
      transform: translateY(0);
    }

    .success-msg {
      display: none;
      text-align: center;
      margin-top: 20px;
      padding: 14px;
      background: #f0fff4;
      border: 1px solid #9ae6b4;
      border-radius: 10px;
      color: #276749;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <span class="icon">✉️</span>
      <h1>Contactez-moi</h1>
      <p>Une question ? Un projet ? Écrivez-moi !</p>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="prenom">Prénom</label>
        <input type="text" id="prenom" placeholder="Jean" />
      </div>
      <div class="form-group">
        <label for="nom">Nom</label>
        <input type="text" id="nom" placeholder="Dupont" />
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="jean.dupont@email.com" />
    </div>

    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" placeholder="Votre message ici..."></textarea>
    </div>

    <button class="btn" onclick="handleSubmit()">Envoyer le message 🚀</button>

    <div class="success-msg" id="success">
      ✅ Merci ! Votre message a bien été pris en compte.
    </div>
  </div>

  <script>
    function handleSubmit() {
      const prenom = document.getElementById('prenom').value.trim();
      const nom = document.getElementById('nom').value.trim();
      const email = document.getElementById('email').value.trim();
      const message = document.getElementById('message').value.trim();

      if (!prenom || !nom || !email || !message) {
        alert('Merci de remplir tous les champs.');
        return;
      }

      document.getElementById('success').style.display = 'block';
    }
  </script>
</body>
</html>
